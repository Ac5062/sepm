<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Affordable Medicine Alternative - Find affordable generic alternatives, compare prices, and locate nearby pharmacies" />
    <title>Affordable Medicine Alternative</title>
    <!-- Prevent flash of wrong theme (FOUC) by applying saved theme before React loads -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
